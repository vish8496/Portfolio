<div class="section bg-dark-1">

  <div class="section-header reveal">
    <span class="section-tag">My Background</span>
    <h2 class="section-bg-text">RESUME</h2>
    <h3 class="section-title">Resume</h3>
    <div class="section-line"></div>
  </div>

  <div class="resume-grid">
    <!-- Education -->
    <div class="resume-col">
      <h4 class="col-heading reveal reveal-left delay-1"><i class="bi bi-mortarboard-fill"></i> Education</h4>
      <div class="timeline">
        <div class="timeline-item reveal reveal-left"
             *ngFor="let c of colleges; let i = index"
             [ngClass]="'delay-' + (i + 1)">
          <div class="timeline-dot"></div>
          <div class="timeline-card">
            <span class="timeline-date">{{ c.date }}</span>
            <h5 class="timeline-role">{{ c.course }}</h5>
            <p class="timeline-org">{{ c.name }}</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Experience -->
    <div class="resume-col">
      <h4 class="col-heading reveal reveal-right delay-1"><i class="bi bi-briefcase-fill"></i> Experience</h4>
      <div class="timeline">
        <div class="timeline-item reveal reveal-right"
             *ngFor="let e of experinces; let i = index"
             [ngClass]="'delay-' + (i + 1)">
          <div class="timeline-dot"></div>
          <div class="timeline-card">
            <span class="timeline-date">{{ e.date }}</span>
            <h5 class="timeline-role">{{ e.designation }}</h5>
            <p class="timeline-org">{{ e.company }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Skills -->
  <div class="skills-section" [class.bars-visible]="barsVisible">
    <h4 class="col-heading reveal"><i class="bi bi-bar-chart-fill"></i> Skills</h4>
    <div class="skills-grid">
      <div class="skill-item reveal" *ngFor="let s of skills; let i = index"
           [ngClass]="'delay-' + ((i % 3) + 1)">
        <div class="skill-header">
          <span class="skill-name">{{ s.skill }}</span>
          <span class="skill-pct">{{ s.percentage }}%</span>
        </div>
        <div class="skill-bar-bg">
          <div class="skill-bar" [style.width.%]="barsVisible ? s.percentage : 0"></div>
        </div>
      </div>
    </div>
  </div>

</div>
