<div class="section bg-dark-1">

  <!-- Section heading -->
  <div class="section-header reveal">
    <span class="section-tag">Get To Know</span>
    <h2 class="section-bg-text">ABOUT</h2>
    <h3 class="section-title">About Me</h3>
    <div class="section-line"></div>
  </div>

  <!-- Bio + Info row -->
  <div class="about-row">
    <div class="bio-col reveal reveal-left delay-1">
      <h2 class="bio-heading">I'm <span class="text-accent">{{ name }}</span>, a Web Developer</h2>
      <p class="bio-text">{{ summary }}</p>
      <a href="../../../assets/Resume/Vishal.pdf" download="" class="btn cv-btn">
        <i class="bi bi-download me-2"></i> Download CV
      </a>
    </div>

    <div class="info-col reveal reveal-right delay-2">
      <ul class="info-list">
        <li>
          <span class="info-label"><i class="bi bi-person-fill"></i> Name</span>
          <span class="info-value">{{ name }}</span>
        </li>
        <li>
          <span class="info-label"><i class="bi bi-envelope-fill"></i> Email</span>
          <span class="info-value">
            <a href="mailto:{{email}}">{{ email }}</a>
          </span>
        </li>
        <li>
          <span class="info-label"><i class="bi bi-calendar-fill"></i> Age</span>
          <span class="info-value">{{ age }}</span>
        </li>
        <li class="border-0">
          <span class="info-label"><i class="bi bi-geo-alt-fill"></i> From</span>
          <span class="info-value">{{ from }}</span>
        </li>
      </ul>
    </div>
  </div>

  <!-- Animated stats -->
  <div class="stats-row">
    <div class="stat-card reveal reveal-scale"
         *ngFor="let stat of stats; let i = index"
         [ngClass]="'delay-' + (i + 1)">
      <div class="stat-number">
        <span class="stat-val">{{ stat.current }}</span>{{ stat.suffix }}
      </div>
      <div class="stat-label">{{ stat.label }}</div>
    </div>
  </div>

</div>
