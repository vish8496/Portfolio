<div class="section bg-dark-2">

  <div class="section-header reveal">
    <span class="section-tag">My Expertise</span>
    <h2 class="section-bg-text">SERVICES</h2>
    <h3 class="section-title">What I Do</h3>
    <div class="section-line"></div>
  </div>

  <div class="services-grid">
    <div class="service-card reveal reveal-scale" *ngFor="let s of services; let i = index"
         [ngClass]="'delay-' + (i + 1)">
      <span class="service-num">{{ (i + 1).toString().padStart(2, '0') }}</span>
      <div class="service-icon-wrap">
        <i class="{{ s.icon }}"></i>
      </div>
      <h4 class="service-title">{{ s.title }}</h4>
      <p class="service-desc">{{ s.information }}</p>
    </div>
  </div>

</div>
