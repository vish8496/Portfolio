<div class="hero">

  <!-- Deep navy radial glow blobs -->
  <div class="hero-glow g1"></div>
  <div class="hero-glow g2"></div>
  <div class="hero-glow g3"></div>

  <!-- 3D Perspective Grid Floor -->
  <div class="hero-grid-3d" aria-hidden="true">
    <div class="grid-floor"></div>
    <div class="grid-lines-h"></div>
  </div>
  <!-- Floating 3D orbs -->
  <div class="orb orb1" aria-hidden="true"></div>
  <div class="orb orb2" aria-hidden="true"></div>
  <div class="orb orb3" aria-hidden="true"></div>

  <!-- Section number -->
  <div class="hero-num" aria-hidden="true">01</div>

  <!-- CSS 3D Sphere -->
  <div class="sphere3d-wrap" aria-hidden="true">
    <div class="sphere3d">
      <div class="sphere-body"></div>
      <div class="sphere-shine"></div>
      <!-- Latitude rings -->
      <div class="lat lr1"></div>
      <div class="lat lr2"></div>
      <div class="lat lr3"></div>
      <div class="lat lr4"></div>
      <div class="lat lr5"></div>
      <!-- Longitude rings -->
      <div class="lon lo1"></div>
      <div class="lon lo2"></div>
      <div class="lon lo3"></div>
      <!-- Orbiting torus ring -->
      <div class="orbit-ring or1"></div>
      <div class="orbit-ring or2"></div>
      <div class="orbit-ring or3"></div>
    </div>
    <div class="sphere-outer-glow"></div>
  </div>

  <!-- Hero content -->
  <div class="hero-content">

    <div class="hero-badges">
      <div class="hero-badge">
        <span class="badge-dot"></span>
        Available for Work
      </div>
      <div class="hero-badge hero-badge--gold">
        <i class="bi bi-building-fill"></i>
        Currently @ Optum
      </div>
    </div>

    <p class="hero-eyebrow">FULL STACK DEVELOPER</p>
    <h1 class="hero-name">Vishal E</h1>

    <div class="hero-typewriter">
      <h2 class="twTest"></h2>
    </div>

    <p class="hero-location">
      <i class="bi bi-geo-alt-fill"></i> Based in {{ from }}
    </p>

    <div class="hero-actions">
      <a href="#section6" class="btn-primary-hero">
        Hire Me <i class="bi bi-arrow-right"></i>
      </a>
      <a href="#section2" class="btn-ghost-hero">
        Explore Work
      </a>
    </div>

  </div>

  <!-- Scroll indicator -->
  <div class="scroll-indicator">
    <div class="scroll-line">
      <span class="scroll-dot"></span>
    </div>
    <span class="scroll-label">SCROLL</span>
  </div>

</div>
